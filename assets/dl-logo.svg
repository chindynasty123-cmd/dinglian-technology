<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">DINGLIAN DL logo</title>
  <desc id="desc">Metallic gold and silver DL monogram for DINGLIAN Global Manufacturing Solutions.</desc>
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff0a8"/>
      <stop offset="0.32" stop-color="#d4af37"/>
      <stop offset="0.68" stop-color="#9b6816"/>
      <stop offset="1" stop-color="#f7d978"/>
    </linearGradient>
    <linearGradient id="silver" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.36" stop-color="#9ca4ad"/>
      <stop offset="0.72" stop-color="#eef1f4"/>
      <stop offset="1" stop-color="#5c636c"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="70%">
      <stop offset="0" stop-color="#d4af37" stop-opacity="0.42"/>
      <stop offset="0.48" stop-color="#070707" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#000000"/>
    </radialGradient>
    <filter id="shadow" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="0" dy="16" stdDeviation="12" flood-color="#000" flood-opacity="0.68"/>
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#d4af37" flood-opacity="0.34"/>
    </filter>
  </defs>
  <rect x="8" y="8" width="240" height="240" rx="54" fill="url(#glow)" stroke="url(#gold)" stroke-width="4"/>
  <g fill="none" stroke="url(#gold)" stroke-linecap="round" opacity="0.86">
    <ellipse cx="128" cy="112" rx="86" ry="50" transform="rotate(-18 128 112)" stroke-width="5"/>
    <ellipse cx="128" cy="112" rx="62" ry="34" transform="rotate(21 128 112)" stroke-width="2.4" opacity="0.72"/>
  </g>
  <g transform="translate(50 50)" filter="url(#shadow)">
    <path d="M14 126 L48 126 L77 34 L44 34 Z" fill="url(#silver)"/>
    <path d="M76 32 H126 C166 32 191 57 186 92 C181 127 153 150 113 150 H67 L76 119 H116 C137 119 151 108 154 90 C157 73 145 63 124 63 H66 Z" fill="url(#gold)"/>
    <path d="M30 126 H166 L151 156 H18 Z" fill="url(#silver)"/>
  </g>
</svg>
