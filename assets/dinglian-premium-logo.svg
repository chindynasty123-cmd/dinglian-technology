<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1536 960" role="img" aria-labelledby="title desc">
  <title id="title">DINGLIAN Premium Logo</title>
  <desc id="desc">Black and gold DINGLIAN global precision manufacturing logo with orbital light trails.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="48%" r="70%">
      <stop offset="0" stop-color="#080808"/>
      <stop offset="0.55" stop-color="#020202"/>
      <stop offset="1" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff2a9"/>
      <stop offset="0.22" stop-color="#f6c747"/>
      <stop offset="0.52" stop-color="#bd7c12"/>
      <stop offset="0.76" stop-color="#f6d772"/>
      <stop offset="1" stop-color="#8b4f08"/>
    </linearGradient>
    <linearGradient id="silver" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.28" stop-color="#8e9298"/>
      <stop offset="0.58" stop-color="#f5f1e8"/>
      <stop offset="1" stop-color="#55585e"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 1 0 0.75 0 0 0.58 0 0 0.35 0 0 0 0 0 .72 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#000" flood-opacity=".75"/>
    </filter>
  </defs>
  <rect width="1536" height="960" fill="url(#bg)"/>
  <g opacity=".82" filter="url(#glow)" fill="none" stroke-linecap="round">
    <ellipse cx="780" cy="360" rx="335" ry="220" transform="rotate(-11 780 360)" stroke="url(#gold)" stroke-width="7"/>
    <ellipse cx="780" cy="360" rx="265" ry="154" transform="rotate(14 780 360)" stroke="#d5a83a" stroke-width="3" opacity=".72"/>
    <path d="M52 816 C428 746 673 851 949 784 C1194 725 1280 532 1512 500" stroke="#a66a12" stroke-width="2" opacity=".64"/>
    <path d="M982 795 C1184 740 1284 642 1478 488" stroke="#b97917" stroke-width="2" opacity=".52"/>
  </g>
  <g fill="url(#gold)" filter="url(#glow)">
    <circle cx="552" cy="238" r="10"/><circle cx="738" cy="196" r="9"/><circle cx="1002" cy="468" r="10"/><circle cx="1080" cy="384" r="10"/>
    <circle cx="1434" cy="508" r="7"/><circle cx="164" cy="782" r="7"/>
  </g>
  <g transform="translate(520 220)" filter="url(#shadow)">
    <path d="M0 260 L74 260 L128 86 L62 86 Z" fill="url(#silver)" stroke="#1b1b1b" stroke-width="4"/>
    <path d="M122 82 H276 C368 82 428 138 414 220 C402 292 346 340 278 358 L330 260 C360 245 378 220 378 190 C378 145 342 118 282 118 H142 Z" fill="url(#gold)" stroke="#1b1b1b" stroke-width="4"/>
    <path d="M74 260 H402 L370 326 H48 Z" fill="url(#silver)" stroke="#1b1b1b" stroke-width="4"/>
  </g>
  <text x="768" y="704" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="76" font-weight="800" letter-spacing="30" fill="url(#gold)" filter="url(#glow)">DINGLIAN</text>
  <line x1="388" y1="740" x2="1148" y2="740" stroke="url(#gold)" stroke-width="3" opacity=".8"/>
  <text x="768" y="792" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" letter-spacing="12" fill="#f2d579">GLOBAL PRECISION MANUFACTURING</text>
</svg>
